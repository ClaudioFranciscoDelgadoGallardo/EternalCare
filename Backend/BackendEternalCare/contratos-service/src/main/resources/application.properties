# ===============================
# CONFIGURACIÓN DEL SERVIDOR
# ===============================
spring.application.name=contratos-service
server.port=8081

# ===============================
# CONEXIÓN A BASE DE DATOS (SUPABASE)
# ===============================
spring.datasource.url=${SUPABASE_URL}
spring.datasource.username=${SUPABASE_USER}
spring.datasource.password=${SUPABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# CONFIGURACIÓN DE JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# update: actualiza el esquema si hay cambios en las entidades sin borrar datos
spring.jpa.hibernate.ddl-auto=update
# Muestra las consultas SQL en la consola para depurar
spring.jpa.show-sql=true