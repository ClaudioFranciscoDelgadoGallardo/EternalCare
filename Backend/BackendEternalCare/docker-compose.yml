version: '3.8'

services:
  bff-service:
    build:
      context: ./bff-service
      dockerfile: Dockerfile
    container_name: bff-service
    ports:
      - "8080:8080"
    environment:
      - SPRING_APPLICATION_NAME=bff-service
      - SERVER_PORT=8080
    networks:
      - eternalcare-network
    restart: unless-stopped

  inventario-service:
    build:
      context: ./inventario-service
      dockerfile: Dockerfile
    container_name: inventario-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_APPLICATION_NAME=inventario-service
      - SERVER_PORT=8081
    networks:
      - eternalcare-network
    restart: unless-stopped
    depends_on:
      - bff-service

  programacion-service:
    build:
      context: ./programacion-service
      dockerfile: Dockerfile
    container_name: programacion-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_APPLICATION_NAME=programacion-service
      - SERVER_PORT=8082
    networks:
      - eternalcare-network
    restart: unless-stopped
    depends_on:
      - bff-service

  contratos-service:
    build:
      context: ./contratos-service
      dockerfile: Dockerfile
    container_name: contratos-service
    ports:
      - "8083:8083"
    environment:
      - SPRING_APPLICATION_NAME=contratos-service
      - SERVER_PORT=8083
    networks:
      - eternalcare-network
    restart: unless-stopped
    depends_on:
      - bff-service

networks:
  eternalcare-network:
    driver: bridge
